  <div class="about-inner">
    <div class="about-text">

      <p class="t" data-de="Die Helvoil AG errichtet in Monthey (VS), auf dem Industriegelände CIMO, die erste Produktionsanlage der Schweiz für erneuerbare Treibstoffe aus recycelten Ölen und Fetten." data-fr="Helvoil AG réalise à Monthey (VS), sur le site industriel CIMO, la première installation en Suisse dédiée à la production de carburants renouvelables à partir d'huiles et graisses recyclées." data-it="Helvoil AG sta realizzando a Monthey (VS), sul sito industriale CIMO, il primo impianto in Svizzera per la produzione di carburanti rinnovabili da oli e grassi riciclati." data-en="Helvoil AG is building Switzerland's first production plant for renewable fuels from recycled oils and fats, located at the CIMO industrial site in Monthey (VS)."></p>

      <p class="t" data-de="Die Anlage wird HVO (Hydrotreated Vegetable Oil), einen erneuerbaren Diesel aus hydrierten Pflanzenölen, sowie SAF (Sustainable Aviation Fuel), den nachhaltigen Treibstoff für die Luftfahrt, produzieren. Die Anlagenkonfiguration ermöglicht einen regulierbaren Produktionsmix zwischen HVO und SAF je nach Marktnachfrage." data-fr="L'installation produira du HVO (Hydrotreated Vegetable Oil), un diesel renouvelable obtenu par hydrogénation d'huiles végétales usagées, ainsi que du SAF (Sustainable Aviation Fuel), le carburant durable pour l'aviation. La configuration de l'installation est conçue pour permettre un mix de production ajustable entre HVO et SAF en fonction de la demande du marché." data-it="L'impianto produrrà HVO (Hydrotreated Vegetable Oil), un diesel rinnovabile ottenuto tramite idrogenazione di oli vegetali usati, e SAF (Sustainable Aviation Fuel), il carburante sostenibile per l'aviazione. La configurazione dell'impianto è progettata per consentire un mix di produzione regolabile tra HVO e SAF in base alla domanda di mercato." data-en="The plant will produce HVO (Hydrotreated Vegetable Oil), a renewable diesel obtained through hydrogenation of used vegetable oils, and SAF (Sustainable Aviation Fuel), the sustainable fuel for aviation. The plant configuration is designed to allow an adjustable production mix between HVO and SAF based on market demand."></p>

      <p class="t" data-de="HVO kann pur oder als Beimischung in jedem modernen Dieselmotor eingesetzt werden, ohne jegliche technische Anpassung, zu jeder Jahreszeit, mit potenziellen CO₂-Emissionsreduktionen von bis zu 90 % gegenüber fossilem Diesel. SAF kann mit konventionellem Kerosin gemischt werden und wird bereits im Linienflugverkehr eingesetzt, womit es zur Reduktion des CO₂-Fussabdrucks der Luftfahrt beiträgt." data-fr="Le HVO peut être utilisé pur ou en mélange dans tout moteur diesel moderne, sans aucune modification technique, en toute saison, avec des réductions potentielles des émissions de CO₂ allant jusqu'à 90 % par rapport au diesel fossile. Le SAF peut être mélangé au kérosène conventionnel et est déjà utilisé dans le transport aérien de ligne, contribuant à la réduction de l'empreinte carbone de l'aviation." data-it="L'HVO può essere impiegato puro o miscelato in qualsiasi motore diesel moderno, senza alcuna modifica tecnica, in ogni stagione, con potenziali riduzioni delle emissioni di CO₂ fino al 90% rispetto al diesel fossile. Il SAF può essere miscelato con il cherosene convenzionale ed è già utilizzato nel trasporto aereo di linea, contribuendo alla riduzione dell'impronta carbonica dell'aviazione." data-en="HVO can be used neat or blended in any modern diesel engine, without any technical modifications, in all seasons, with potential CO₂ emission reductions of up to 90% compared to fossil diesel. SAF can be blended with conventional jet fuel and is already in use in commercial aviation, contributing to the reduction of aviation's carbon footprint."></p>

      <p class="t" data-de="Als erster Schweizer Hersteller von umweltverträglichen Treibstoffen aus erneuerbaren Quellen leistet Helvoil einen konkreten Beitrag zu einer grösseren Selbstversorgung der Schweiz im Strassen- und Luftverkehr. Das Projekt wird unter anderem von UBS/Fontavis unterstützt." data-fr="En tant que premier producteur suisse de carburants écocompatibles issus de sources renouvelables, Helvoil contribue concrètement à une plus grande autonomie de la Suisse dans le transport routier et aérien. Le projet est soutenu, entre autres, par UBS/Fontavis." data-it="Come primo produttore svizzero di carburanti ecocompatibili da fonti rinnovabili, Helvoil contribuisce concretamente a una maggiore autosufficienza della Svizzera nel trasporto stradale e aereo. Il progetto è sostenuto, tra gli altri, da UBS/Fontavis." data-en="As Switzerland's first producer of eco-compatible fuels from renewable sources, Helvoil contributes concretely to greater Swiss self-sufficiency in road and air transport. The project is backed, among others, by UBS/Fontavis."></p>

<script>
(function() {
  var currentLang = 'de';

  // Nav link texts
  var navData = {
    de: [['#about','Über uns'],['#contact','Kontakt']],
    fr: [['#about','À propos'],['#contact','Contact']],
    it: [['#about','Chi siamo'],['#contact','Contatto']],
    en: [['#about','About'],['#contact','Contact']]
  };

  function setLang(lang) {
    currentLang = lang;

    // Update all translatable elements
    var els = document.querySelectorAll('.t');
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      var text = el.getAttribute('data-' + lang);
      if (text) {
        el.innerHTML = text;
        el.style.display = '';
      }
    }

    // Update nav links
    var navLinksEl = document.getElementById('navLinks');
    var html = '';
    var links = navData[lang];
    for (var j = 0; j < links.length; j++) {
      html += '<li><a href="' + links[j][0] + '">' + links[j][1] + '</a></li>';
    }
    navLinksEl.innerHTML = html;

    // Re-bind nav link clicks to close mobile menu
    var newLinks = navLinksEl.querySelectorAll('a');
    for (var k = 0; k < newLinks.length; k++) {
      newLinks[k].addEventListener('click', function() {
        document.getElementById('navbar').classList.remove('open');
      });
    }

    // Update lang buttons
    var btns = document.querySelectorAll('.lang-btn');
    for (var b = 0; b < btns.length; b++) {
      if (btns[b].getAttribute('data-lang-btn') === lang) {
        btns[b].classList.add('active');
      } else {
        btns[b].classList.remove('active');
      }
    }

    document.documentElement.lang = lang;
  }

  // Bind lang buttons
  var langBtns = document.querySelectorAll('.lang-btn');
  for (var i = 0; i < langBtns.length; i++) {
    langBtns[i].addEventListener('click', function() {
      setLang(this.getAttribute('data-lang-btn'));
    });
  }

  // Init
  setLang('de');

  // Nav scroll shadow
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('navbar');
    if (window.scrollY > 20) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  });

  // Hamburger
  document.getElementById('hamburger').addEventListener('click', function() {
    document.getElementById('navbar').classList.toggle('open');
  });
})();
</script>
